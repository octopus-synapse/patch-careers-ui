# Pre-commit check definitions consumed by `octopus-run-parallel`.
# Parallel phase: Turbo fan-out handles per-package work across the monorepo.
# Serial phase: nothing generated here (unlike profile-services which generates
# Swagger first); add entries if a future codegen step needs to stage files.

checks:
  - name: typecheck
    cmd: bunx turbo run check
  - name: lint
    cmd: bunx biome check .
  - name: no-any
    cmd: bash scripts/check-no-any.sh
  - name: sdk-drift
    cmd: bash scripts/check-sdk-drift.sh
  - name: i18n-keys
    cmd: bun scripts/check-i18n-keys.ts
  - name: i18n-orphans
    cmd: bun scripts/lint-unused-i18n.ts
  - name: i18n-parity
    cmd: bun scripts/check-i18n-parity.ts
  - name: i18n-missing
    cmd: bun scripts/check-i18n-missing-keys.ts
  - name: no-hardcoded-pt
    cmd: bun scripts/check-no-hardcoded-pt.ts
  - name: i18n-hardcoded
    cmd: bun scripts/check-i18n-hardcoded.ts
  - name: no-api-client-deep-imports
    cmd: bun scripts/lint-no-api-client-deep-imports.ts
  - name: form-schema-from-sdk
    cmd: bun scripts/lint-form-schema-from-sdk.ts
  - name: file-size
    cmd: bun scripts/lint-file-size.ts
