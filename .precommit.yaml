# Pre-commit check definitions consumed by `octopus-run-parallel`.
# Parallel phase: Turbo fan-out handles per-package work across the monorepo.
# Serial phase: nothing generated here (unlike profile-services which generates
# Swagger first); add entries if a future codegen step needs to stage files.

checks:
  - name: typecheck
    cmd: bunx turbo run check
  - name: lint
    cmd: bunx biome check .
  - name: no-any
    cmd: bash scripts/check-no-any.sh
  - name: sdk-drift
    cmd: bash scripts/check-sdk-drift.sh
  - name: i18n-keys
    cmd: bun scripts/check-i18n-keys.ts
