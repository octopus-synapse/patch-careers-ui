# Maestro flows for the V2 auth screens (PR #7).
#
# Run locally with `maestro test apps/app/.maestro/auth-flows.yaml`
# pointed at a debug build of the app and a backend with seed users.
#
# Three end-to-end paths covered:
#   1. sign-up → verify-email → jobs tab
#   2. sign-in (no 2FA) → jobs tab
#   3. sign-in (2FA required) → 2fa-verify → jobs tab
#
# Seed users expected on the backend (override via env BACKEND_SEED_*):
#   - SEED_NEW_EMAIL: a fresh email the backend hasn't seen
#   - SEED_USER_EMAIL / SEED_USER_PASSWORD: non-2FA test account
#   - SEED_2FA_EMAIL / SEED_2FA_PASSWORD: account with 2FA enabled
#   - SEED_2FA_CODE: a valid TOTP code for the 2FA account

appId: com.patchcareers.app
---
# ── Flow 1: sign-up → verify-email ────────────────────────────────────────
- launchApp:
    clearState: true
- tapOn:
    id: "signup.signInLink"  # only present from sign-in if we landed there; if not skip
    optional: true
- assertVisible:
    text: "Crie sua conta|Create your account"
    optional: true
- tapOn:
    id: "auth.signUpLink"
    optional: true
- tapOn:
    id: "signup.email"
- inputText: ${MAESTRO_SEED_NEW_EMAIL:-newuser+${EPOCH}@example.com}
- tapOn:
    id: "signup.password"
- inputText: "Str0ngP@ssw0rd!"
- tapOn:
    id: "signup.consent"
- tapOn:
    id: "signup.submit"
- assertVisible:
    text: "Verifique seu e-mail|Verify your email"
- back

---
# ── Flow 2: sign-in (no 2FA) → jobs ───────────────────────────────────────
- launchApp:
    clearState: true
- assertVisible:
    text: "Entre na sua conta|Sign in to your account"
- tapOn:
    id: "auth.email"
- inputText: ${MAESTRO_SEED_USER_EMAIL:-user@example.com}
- tapOn:
    id: "auth.password"
- inputText: ${MAESTRO_SEED_USER_PASSWORD:-password123}
- tapOn:
    id: "auth.submit"
- assertVisible:
    text: "Jobs"
    timeout: 8000

---
# ── Flow 3: sign-in with 2FA → 2fa-verify → jobs ──────────────────────────
- launchApp:
    clearState: true
- tapOn:
    id: "auth.email"
- inputText: ${MAESTRO_SEED_2FA_EMAIL:-2fa-user@example.com}
- tapOn:
    id: "auth.password"
- inputText: ${MAESTRO_SEED_2FA_PASSWORD:-password123}
- tapOn:
    id: "auth.submit"
- assertVisible:
    text: "Verificação em duas etapas|Two-factor verification"
    timeout: 5000
# OTP input has 6 numbered slots; tap the first and rely on autoFocus
# moving forward as each digit is entered.
- tapOn:
    point: "50%, 40%"
- inputText: ${MAESTRO_SEED_2FA_CODE:-123456}
- assertVisible:
    text: "Jobs"
    timeout: 8000
