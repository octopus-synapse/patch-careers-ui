<svg width="470" height="120" viewBox="0 0 470 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Patch Careers">
  <defs>
    <clipPath id="pcLogoRounded">
      <rect x="10" y="11" width="96" height="96" rx="22" />
    </clipPath>
  </defs>

  <!-- Mark: two interlocking jigsaw pieces -->
  <g clip-path="url(#pcLogoRounded)">
    <g transform="translate(10,11) scale(0.96)">
      <path fill="#2563EB" d="M0 0 H100 V48 H62 C70 40 66 18 50 18 C34 18 30 40 38 48 H0 Z" />
      <path fill="#0F172A" d="M0 52 H38 C30 44 34 22 50 22 C66 22 70 44 62 52 H100 V100 H0 Z" />
    </g>
  </g>

  <!-- Wordmark. Text is set with a geometric bold sans; outline to paths in a
       vector tool for a font-independent asset if needed. -->
  <text x="130" y="66"
        font-family="Montserrat, 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="-1" fill="#0F172A">PATCH</text>
  <text x="132" y="97"
        font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="500" letter-spacing="9" fill="#1E293B">CAREERS</text>
</svg>
