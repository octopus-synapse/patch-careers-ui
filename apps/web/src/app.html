<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Speculative TCP+TLS to the API so the first authenticated request
			doesn't eat the handshake (~100ms). Prod replaces the URL via the
			SvelteKit env injection. -->
		<link rel="preconnect" href="http://localhost:3001" crossorigin="use-credentials" />
		<link rel="dns-prefetch" href="http://localhost:3001" />
		<!-- Brand-consistent typography across every OS. Inter is pulled from
			Google Fonts so the app never inherits the user's system font —
			the UI looks identical on macOS, Windows and Linux. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- SvelteKit's preload-on-hover already ignores external + mailto/tel
			targets; keep it enabled for internal nav hovers. -->
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
