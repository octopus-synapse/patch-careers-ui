name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-web
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}
  DEPLOY_PATH: /opt/patch-careers-ui

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build & Push Image
        run: |
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build \
            --build-arg VITE_API_URL=https://backend.patchcareers.org \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCTOPUS_SSH_PRIVATE_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H ${{ secrets.OCTOPUS_VM_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/key ${{ secrets.OCTOPUS_VM_USER }}@${{ secrets.OCTOPUS_VM_HOST }} << 'DEPLOY'
            mkdir -p ${{ env.DEPLOY_PATH }}

            cat > ${{ env.DEPLOY_PATH }}/docker-compose.yml << 'COMPOSE'
          services:
            web:
              image: ${{ env.IMAGE }}:latest
              container_name: patchcareers-web
              restart: unless-stopped
              environment:
                PORT: 7142
                ORIGIN: https://patchcareers.org
              ports:
                - "7142:7142"
              healthcheck:
                test: ["CMD", "bun", "-e", "fetch('http://localhost:7142').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
                interval: 30s
                timeout: 3s
                retries: 3
                start_period: 10s
          COMPOSE

            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE }}:latest
            cd ${{ env.DEPLOY_PATH }}
            docker compose up -d --force-recreate
            sleep 10
            docker ps --filter name=patchcareers-web --format '{{.Names}} {{.Status}}'
          DEPLOY

      - name: Health Check
        run: |
          sleep 15
          curl -sf --retry 5 --retry-delay 5 https://patchcareers.org || echo "Health check pending - DNS may need time"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/key ~/.ssh/known_hosts
