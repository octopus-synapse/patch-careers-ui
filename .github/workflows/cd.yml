name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: production-web
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}
  DEPLOY_PATH: /opt/patch-careers-ui

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.deploy == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy:
              - 'apps/**'
              - 'packages/**'
              - 'Dockerfile'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/cd.yml'

  deploy:
    name: Build & Deploy
    needs: changes
    if: needs.changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://backend.patchcareers.org
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCTOPUS_SSH_PRIVATE_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H ${{ secrets.OCTOPUS_VM_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/key ${{ secrets.OCTOPUS_VM_USER }}@${{ secrets.OCTOPUS_VM_HOST }} << 'DEPLOY'
            mkdir -p ${{ env.DEPLOY_PATH }}

            cat > ${{ env.DEPLOY_PATH }}/docker-compose.yml << 'COMPOSE'
          services:
            web:
              image: ${{ env.IMAGE }}:latest
              container_name: patchcareers-web
              restart: unless-stopped
              environment:
                PORT: 7142
                ORIGIN: https://patchcareers.org
              ports:
                - "7142:7142"
              healthcheck:
                test: ["CMD", "bun", "-e", "fetch('http://localhost:7142').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
                interval: 30s
                timeout: 3s
                retries: 3
                start_period: 10s
          COMPOSE

            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE }}:latest
            cd ${{ env.DEPLOY_PATH }}
            docker compose up -d --force-recreate
            sleep 10
            docker ps --filter name=patchcareers-web
          DEPLOY

      - name: Health Check
        run: |
          curl -sf --retry 15 --retry-connrefused --retry-delay 2 --retry-max-time 45 \
            https://patchcareers.org || echo "::warning::Health check did not pass - DNS may need time"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/key ~/.ssh/known_hosts
