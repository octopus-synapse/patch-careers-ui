name: CI / Build

on:
  workflow_call:
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE }}:pr-${{ github.sha }}
          cache-from: |
            type=gha,scope=patch-careers-ui
            type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=gha,scope=patch-careers-ui,mode=max
