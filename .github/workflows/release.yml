name: Release

# V2 release pipeline. The V1 docker-image build step is removed:
# - apps/app ships via EAS Build / EAS Submit (PR #20)
# - packages/* are private to this workspace today (no npm publish)
# Versioning still rides release-please via the octopus-synapse
# shared workflows.

on:
  push:
    branches: [homolog, main]
  workflow_dispatch:
    inputs:
      force_release_type:
        description: "Force release type"
        type: choice
        options: ["", patch, minor, major]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  create-release-pr:
    if: github.ref == 'refs/heads/homolog'
    uses: octopus-synapse/octopus-workflows/.github/workflows/_release-create-pr.yml@v1
    with:
      sha: ${{ github.sha }}
      forced_type: ${{ github.event.inputs.force_release_type || '' }}
      repository: ${{ github.repository }}
      repository_owner: ${{ github.repository_owner }}
      repository_name: ${{ github.event.repository.name }}
    secrets: inherit

  finalize-release:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'chore(release):'))
    uses: octopus-synapse/octopus-workflows/.github/workflows/_release-finalize.yml@v1
    with:
      commit_sha: ${{ github.sha }}
