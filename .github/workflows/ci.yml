name: CI

on:
  pull_request:
    branches: [main, homolog, dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-attestation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Required: GH Actions does NOT auto-authenticate docker pulls of the
      # Docker-backed verify-attestation action from GHCR when the image is
      # scoped 'internal' (only 'public' is no-auth). Explicit login uses
      # the workflow's GITHUB_TOKEN which has packages:read across the org.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: octopus-synapse/octopus-workflows/.github/actions/verify-attestation@v1

  build:
    needs: verify-attestation
    uses: ./.github/workflows/ci.build.yml
    secrets: inherit

  e2e:
    needs: verify-attestation
    uses: ./.github/workflows/ci.infrastructure.e2e.yml
    secrets: inherit
