name: PR Comment

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - id: pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const r = context.payload.workflow_run;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              head: `${r.head_repository.owner.login}:${r.head_branch}`, state: 'open',
            });
            return prs.data[0]?.number ?? '';
      - if: steps.pr.outputs.result != ''
        uses: octopus-synapse/octopus-workflows/.github/actions/post-ci-comment@v1
        with:
          github-token: ${{ github.token }}
          pr-number: ${{ steps.pr.outputs.result }}
          checks-json: '[{"name":"ci","status":"${{ github.event.workflow_run.conclusion }}","duration_s":"-"}]'
