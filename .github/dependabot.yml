version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule: { interval: weekly, day: monday, time: '03:00', timezone: America/Sao_Paulo }
    open-pull-requests-limit: 10
    commit-message: { prefix: chore(deps), include: scope }
    groups:
      biome: { patterns: ['@biomejs/*'] }
      commitlint: { patterns: ['@commitlint/*', commitlint] }
      svelte: { patterns: [svelte, '@sveltejs/*', 'svelte-*'] }
      tanstack: { patterns: ['@tanstack/*'] }
      tailwind: { patterns: [tailwindcss, '@tailwindcss/*'] }
      vite: { patterns: [vite, '@vitejs/*', vitest] }
      playwright: { patterns: ['@playwright/*', playwright] }
      types: { patterns: ['@types/*'] }
      octopus: { patterns: ['@octopus-synapse/*'] }
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly, day: monday, time: '03:00', timezone: America/Sao_Paulo }
    open-pull-requests-limit: 5
    commit-message: { prefix: ci(deps) }
